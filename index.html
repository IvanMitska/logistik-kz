<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>logistics.kaz — Доставка грузов из Китая в Казахстан и Россию</title>
    <meta
      name="description"
      content="logistics.kaz — белая логистика товаров из Китая в Казахстан и Россию. Доставка контейнерами по ЖД от $0.5 за кг с полной растаможкой. Срок 2–6 недель, заказ от 1 тонны."
    />
    <meta name="keywords" content="логистика, доставка из Китая, Казахстан, Россия, растаможка, ЖД перевозки, контейнерные перевозки, грузоперевозки" />
    <meta name="author" content="logistics.kaz" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://logistica-kaz.kz/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://logistica-kaz.kz/" />
    <meta property="og:title" content="logistics.kaz — Доставка грузов из Китая в Казахстан и Россию" />
    <meta property="og:description" content="Белая логистика из Китая по ЖД от $0.5/кг с полной растаможкой. Срок 2–6 недель." />
    <meta property="og:site_name" content="logistics.kaz" />
    <meta property="og:locale" content="ru_RU" />

    <meta name="theme-color" content="#15110C" />

    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking: fonts swap in when ready, first paint doesn't wait for Google CSS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <!-- Hero images: sky is a CSS background (discovered late by the browser), so preload it
         together with the two container layers to paint the hero as early as possible. -->
    <link rel="preload" as="image" type="image/avif" href="/sky.avif" />
    <link rel="preload" as="image" type="image/avif" href="/container-2.avif" />
    <link rel="preload" as="image" type="image/avif" href="/stack.avif" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/PPNeueMontreal-Regular.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/PPNeueMontreal-Semibold.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/PPNeueMontreal-Extrabold.woff2" />
    <!-- Declared statically (not via runtime-injected GlobalStyles) so the preloaded fonts
         are referenced immediately at load — otherwise the browser warns they go unused. -->
    <style>
      @font-face {
        font-family: 'PP Neue Montreal';
        src: url('/fonts/PPNeueMontreal-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'PP Neue Montreal';
        src: url('/fonts/PPNeueMontreal-Semibold.woff2') format('woff2');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'PP Neue Montreal';
        src: url('/fonts/PPNeueMontreal-Extrabold.woff2') format('woff2');
        font-weight: 800;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <!-- Static first frame of the preloader: identical layout/colors to the React
         Preloader, painted before any JS arrives so FCP fires immediately. React's
         createRoot().render() replaces it with the live preloader at the same 0%
         state — the mark placeholder is opacity:0 to match its animation start. -->
    <style>
      #root:empty::before { content: ''; position: fixed; inset: 0; background: #070a0d; }
      .boot {
        position: fixed; inset: 0; z-index: 9000; background: #070a0d; color: #fff;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: clamp(22px, 4vh, 40px); padding: clamp(28px, 6vw, 72px); overflow: hidden;
      }
      .boot svg { width: clamp(180px, 28vw, 340px); height: auto; overflow: visible; opacity: 0; }
      .boot-meta { display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2.4vh, 22px); width: min(280px, 60vw); }
      .boot-counter {
        font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.95rem;
        letter-spacing: 0.18em; color: rgba(255, 255, 255, 0.6); font-variant-numeric: tabular-nums;
      }
      .boot-bar { height: 2px; width: 100%; background: rgba(255, 255, 255, 0.12); border-radius: 999px; }
      .boot-sub {
        font-family: 'Schibsted Grotesk', system-ui, sans-serif; font-size: 0.66rem; font-weight: 600;
        letter-spacing: 0.22em; text-transform: uppercase; color: #8893a0; min-height: 1em;
      }
    </style>
    <div id="root">
      <div class="boot">
        <svg viewBox="0 0 740 740" aria-hidden="true"><rect x="409.465" y="358.635" width="234.383" height="19.7672" fill="#FF8000"/></svg>
        <div class="boot-meta">
          <div class="boot-counter">000%</div>
          <div class="boot-bar"></div>
          <div class="boot-sub" id="boot-sub"></div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var subs = { ru: 'Китай → Казахстан · Россия', kk: 'Қытай → Қазақстан · Ресей', en: 'China → Kazakhstan · Russia' };
        var l;
        try { l = localStorage.getItem('lk-lang'); } catch (e) {}
        if (!subs[l]) l = (navigator.language || 'ru').slice(0, 2).toLowerCase();
        document.getElementById('boot-sub').textContent = subs[l] || subs.ru;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
